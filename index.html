<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FitPulse</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Oswald:wght@500;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --green: #8bc34a;
      --green-dark: #6a9f35;
      --blue: #29b6f6;
      --orange: #ff8c00;
      --purple: #9c27b0;
      --red: #f44336;
      --bg: #f4f6f8;
      --card: #ffffff;
      --text: #2d2d2d;
      --muted: #aaa;
      --ring-bg: #1e1e1e;
      --ring-fill: #8bc34a;
      --nav-h: 72px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Nunito', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      max-width: 430px;
      margin: 0 auto;
      position: relative;
    }

    /* ── HEADER ── */
    header {
      background: var(--card);
      padding: 18px 20px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 2px 8px rgba(0,0,0,.06);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .logo {
      font-family: 'Oswald', sans-serif;
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 1px;
    }
    .logo span:first-child { color: var(--green); }
    .logo span:last-child  { color: var(--text); }

    .date {
      font-size: 12px;
      color: var(--muted);
      margin-top: 2px;
    }

    .header-badges {
      display: flex;
      gap: 14px;
    }

    .badge {
      display: flex;
      align-items: center;
      gap: 4px;
      font-weight: 800;
      font-size: 15px;
    }
    .badge-fire { color: #ff5722; }
    .badge-zap  { color: var(--green); }

    /* ── MAIN SCROLL ── */
    main {
      flex: 1;
      overflow-y: auto;
      padding: 20px 16px calc(var(--nav-h) + 20px);
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    /* ── RING CARD ── */
    .ring-card {
      background: var(--card);
      border-radius: 20px;
      padding: 24px 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 16px rgba(0,0,0,.07);
    }

    .ring-wrap {
      position: relative;
      width: 180px;
      height: 180px;
    }

    .ring-wrap svg {
      width: 180px;
      height: 180px;
      transform: rotate(-90deg);
    }

    .ring-bg-circle {
      fill: none;
      stroke: #e8e8e8;
      stroke-width: 14;
    }

    .ring-progress {
      fill: none;
      stroke: var(--ring-fill);
      stroke-width: 14;
      stroke-linecap: round;
      stroke-dasharray: 502;
      stroke-dashoffset: 502;
      transition: stroke-dashoffset 1s ease;
    }

    .ring-dot {
      fill: var(--green);
      transition: all 1s ease;
    }

    .ring-center {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .ring-kcal {
      font-family: 'Oswald', sans-serif;
      font-size: 48px;
      font-weight: 700;
      color: var(--green);
      line-height: 1;
    }

    .ring-label {
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-top: 4px;
    }

    .ring-goal {
      font-size: 12px;
      color: var(--muted);
      margin-top: 2px;
    }

    /* ── STATS ROW ── */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      background: var(--card);
      border-radius: 20px;
      box-shadow: 0 4px 16px rgba(0,0,0,.07);
      overflow: hidden;
    }

    .stat-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 16px 8px;
      cursor: pointer;
      transition: background .15s;
      gap: 4px;
    }
    .stat-item:not(:last-child) { border-right: 1px solid #f0f0f0; }
    .stat-item:hover { background: #fafafa; }

    .stat-val {
      font-family: 'Oswald', sans-serif;
      font-size: 22px;
      font-weight: 700;
    }
    .stat-val.green  { color: var(--green); }
    .stat-val.blue   { color: var(--blue); }
    .stat-val.orange { color: var(--orange); }
    .stat-val.purple { color: var(--purple); }

    .stat-emoji { font-size: 18px; }
    .stat-name  { font-size: 11px; color: var(--muted); font-weight: 600; }

    /* ── SECTION HEADER ── */
    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .section-title {
      font-size: 16px;
      font-weight: 800;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .btn-add {
      background: none;
      border: none;
      color: var(--green);
      font-family: 'Nunito', sans-serif;
      font-weight: 800;
      font-size: 14px;
      cursor: pointer;
      padding: 6px 10px;
      border-radius: 8px;
      transition: background .15s;
    }
    .btn-add:hover { background: #f0f8e8; }

    /* ── WORKOUTS ── */
    .workouts-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
      min-height: 60px;
    }

    .empty-state {
      text-align: center;
      color: var(--muted);
      font-size: 13px;
      padding: 20px 0;
    }

    .workout-item {
      background: var(--card);
      border-radius: 14px;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 14px;
      box-shadow: 0 2px 8px rgba(0,0,0,.05);
      animation: slideIn .3s ease;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .workout-icon {
      width: 42px;
      height: 42px;
      border-radius: 12px;
      background: #f0f8e8;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .workout-info { flex: 1; }
    .workout-name { font-weight: 800; font-size: 14px; }
    .workout-meta { font-size: 12px; color: var(--muted); margin-top: 2px; }

    .workout-kcal {
      font-family: 'Oswald', sans-serif;
      font-size: 18px;
      font-weight: 700;
      color: var(--orange);
    }

    .workout-kcal-label { font-size: 10px; color: var(--muted); text-align: right; }

    .btn-delete {
      background: none;
      border: none;
      color: #ddd;
      cursor: pointer;
      font-size: 18px;
      padding: 4px;
      border-radius: 6px;
      transition: color .15s;
    }
    .btn-delete:hover { color: var(--red); }

    /* ── MODAL ── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.45);
      z-index: 200;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity .25s;
    }
    .modal-overlay.open {
      opacity: 1;
      pointer-events: all;
    }

    .modal {
      background: var(--card);
      border-radius: 24px 24px 0 0;
      padding: 24px 20px 36px;
      width: 100%;
      max-width: 430px;
      transform: translateY(100%);
      transition: transform .3s ease;
    }
    .modal-overlay.open .modal {
      transform: translateY(0);
    }

    .modal-title {
      font-family: 'Oswald', sans-serif;
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 18px;
      text-align: center;
    }

    .workout-options {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 20px;
    }

    .workout-opt {
      background: var(--bg);
      border: 2px solid transparent;
      border-radius: 14px;
      padding: 12px 8px;
      cursor: pointer;
      text-align: center;
      transition: all .15s;
    }
    .workout-opt:hover, .workout-opt.selected {
      border-color: var(--green);
      background: #f0f8e8;
    }
    .workout-opt-icon { font-size: 26px; }
    .workout-opt-name { font-size: 11px; font-weight: 700; color: var(--text); margin-top: 4px; }

    .modal-inputs {
      display: flex;
      gap: 10px;
      margin-bottom: 16px;
    }

    .modal-input {
      flex: 1;
      border: 2px solid #e8e8e8;
      border-radius: 12px;
      padding: 12px 14px;
      font-family: 'Nunito', sans-serif;
      font-size: 14px;
      font-weight: 700;
      outline: none;
      transition: border-color .15s;
    }
    .modal-input:focus { border-color: var(--green); }

    .btn-confirm {
      width: 100%;
      background: var(--green);
      color: #fff;
      border: none;
      border-radius: 14px;
      padding: 14px;
      font-family: 'Nunito', sans-serif;
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
      transition: background .15s;
    }
    .btn-confirm:hover { background: var(--green-dark); }

    .btn-cancel {
      width: 100%;
      background: none;
      border: none;
      color: var(--muted);
      font-family: 'Nunito', sans-serif;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      padding: 10px;
      margin-top: 4px;
    }

    /* ── WATER MODAL ── */
    .water-btns {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 16px;
    }
    .water-btn {
      background: #e3f2fd;
      border: 2px solid transparent;
      border-radius: 12px;
      padding: 12px 8px;
      cursor: pointer;
      font-family: 'Nunito', sans-serif;
      font-weight: 800;
      font-size: 13px;
      color: var(--blue);
      transition: all .15s;
      text-align: center;
    }
    .water-btn:hover { border-color: var(--blue); }

    /* ── BOTTOM NAV ── */
    nav {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 430px;
      height: var(--nav-h);
      background: var(--card);
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      border-top: 1px solid #eee;
      z-index: 100;
    }

    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      cursor: pointer;
      transition: all .15s;
      border: none;
      background: none;
      padding: 8px 4px;
    }

    .nav-icon { font-size: 24px; }
    .nav-label { font-size: 11px; font-weight: 700; color: var(--muted); }
    .nav-item.active .nav-label { color: var(--green); }
    .nav-item.active .nav-icon { filter: drop-shadow(0 0 4px rgba(139,195,74,.5)); }
  </style>
</head>
<body>

<!-- HEADER -->
<header>
  <div>
    <div class="logo"><span>FIT</span><span>PULSE</span></div>
    <div class="date" id="dateLabel">вторник, 28 апреля</div>
  </div>
  <div class="header-badges">
    <div class="badge badge-fire">🔥 <span id="streakVal">0</span></div>
    <div class="badge badge-zap">⚡ <span id="pointsVal">0</span></div>
  </div>
</header>

<!-- MAIN -->
<main>

  <!-- RING -->
  <div class="ring-card">
    <div class="ring-wrap">
      <svg viewBox="0 0 180 180" xmlns="http://www.w3.org/2000/svg">
        <circle class="ring-bg-circle" cx="90" cy="90" r="80"/>
        <circle class="ring-progress" id="ringProgress" cx="90" cy="90" r="80"/>
        <circle class="ring-dot" id="ringDot" cx="90" cy="10" r="7"/>
      </svg>
      <div class="ring-center">
        <div class="ring-kcal" id="kcalBurned">0</div>
        <div class="ring-label">ккал сожжено</div>
        <div class="ring-goal">цель: <span id="goalVal">2000</span> ккал</div>
      </div>
    </div>
  </div>

  <!-- STATS -->
  <div class="stats-row">
    <div class="stat-item" onclick="openStepsModal()">
      <div class="stat-val green" id="stepsVal">0</div>
      <div class="stat-emoji">🥾</div>
      <div class="stat-name">шаги</div>
    </div>
    <div class="stat-item" onclick="openWaterModal()">
      <div class="stat-val blue" id="waterVal">0.0</div>
      <div class="stat-emoji">💧</div>
      <div class="stat-name">литры</div>
    </div>
    <div class="stat-item">
      <div class="stat-val orange" id="workoutCount">0</div>
      <div class="stat-emoji">🏋️</div>
      <div class="stat-name">трен.</div>
    </div>
    <div class="stat-item">
      <div class="stat-val purple" id="foodKcal">0</div>
      <div class="stat-emoji">🍽️</div>
      <div class="stat-name">ккал</div>
    </div>
  </div>

  <!-- WORKOUTS -->
  <div class="section-header">
    <div class="section-title">Тренировки</div>
    <button class="btn-add" onclick="openWorkoutModal()">+ Добавить</button>
  </div>

  <div class="workouts-list" id="workoutsList">
    <div class="empty-state" id="emptyWorkouts">Нет тренировок. Добавьте первую! 💪</div>
  </div>

</main>

<!-- BOTTOM NAV -->
<nav>
  <button class="nav-item active">
    <span class="nav-icon">🏠</span>
    <span class="nav-label">Главная</span>
  </button>
  <button class="nav-item">
    <span class="nav-icon">🍽️</span>
    <span class="nav-label">Питание</span>
  </button>
  <button class="nav-item">
    <span class="nav-icon">📊</span>
    <span class="nav-label">Прогресс</span>
  </button>
  <button class="nav-item">
    <span class="nav-icon">👤</span>
    <span class="nav-label">Профиль</span>
  </button>
</nav>

<!-- WORKOUT MODAL -->
<div class="modal-overlay" id="workoutModal">
  <div class="modal">
    <div class="modal-title">Добавить тренировку</div>
    <div class="workout-options">
      <div class="workout-opt" data-name="Бег" data-icon="🏃" data-kcal="8" onclick="selectWorkout(this)">
        <div class="workout-opt-icon">🏃</div>
        <div class="workout-opt-name">Бег</div>
      </div>
      <div class="workout-opt" data-name="Велосипед" data-icon="🚴" data-kcal="6" onclick="selectWorkout(this)">
        <div class="workout-opt-icon">🚴</div>
        <div class="workout-opt-name">Велосипед</div>
      </div>
      <div class="workout-opt" data-name="Силовая" data-icon="🏋️" data-kcal="7" onclick="selectWorkout(this)">
        <div class="workout-opt-icon">🏋️</div>
        <div class="workout-opt-name">Силовая</div>
      </div>
      <div class="workout-opt" data-name="Плавание" data-icon="🏊" data-kcal="9" onclick="selectWorkout(this)">
        <div class="workout-opt-icon">🏊</div>
        <div class="workout-opt-name">Плавание</div>
      </div>
      <div class="workout-opt" data-name="Йога" data-icon="🧘" data-kcal="3" onclick="selectWorkout(this)">
        <div class="workout-opt-icon">🧘</div>
        <div class="workout-opt-name">Йога</div>
      </div>
      <div class="workout-opt" data-name="Ходьба" data-icon="🚶" data-kcal="4" onclick="selectWorkout(this)">
        <div class="workout-opt-icon">🚶</div>
        <div class="workout-opt-name">Ходьба</div>
      </div>
    </div>
    <div class="modal-inputs">
      <input class="modal-input" type="number" id="workoutDuration" placeholder="Минуты" min="1" />
    </div>
    <button class="btn-confirm" onclick="addWorkout()">Добавить</button>
    <button class="btn-cancel" onclick="closeModal('workoutModal')">Отмена</button>
  </div>
</div>

<!-- WATER MODAL -->
<div class="modal-overlay" id="waterModal">
  <div class="modal">
    <div class="modal-title">💧 Добавить воду</div>
    <div class="water-btns">
      <div class="water-btn" onclick="addWater(0.15)">150 мл</div>
      <div class="water-btn" onclick="addWater(0.25)">250 мл</div>
      <div class="water-btn" onclick="addWater(0.33)">330 мл</div>
      <div class="water-btn" onclick="addWater(0.5)">500 мл</div>
      <div class="water-btn" onclick="addWater(0.75)">750 мл</div>
      <div class="water-btn" onclick="addWater(1.0)">1 литр</div>
    </div>
    <div class="modal-inputs">
      <input class="modal-input" type="number" id="waterCustom" placeholder="Свой объём (л)" step="0.1" min="0.1" />
    </div>
    <button class="btn-confirm" onclick="addWaterCustom()">Добавить</button>
    <button class="btn-cancel" onclick="closeModal('waterModal')">Отмена</button>
  </div>
</div>

<!-- STEPS MODAL -->
<div class="modal-overlay" id="stepsModal">
  <div class="modal">
    <div class="modal-title">🥾 Шаги</div>
    <div class="modal-inputs">
      <input class="modal-input" type="number" id="stepsInput" placeholder="Количество шагов" min="0" />
    </div>
    <button class="btn-confirm" onclick="setSteps()">Сохранить</button>
    <button class="btn-cancel" onclick="closeModal('stepsModal')">Отмена</button>
  </div>
</div>

<script>
  // ── STATE ──
  let state = {
    kcal: 0,
    goal: 2000,
    water: 0,
    steps: 0,
    workouts: [],
    streak: 0,
    points: 0
  };

  let selectedWorkout = null;

  // ── DATE ──
  const days = ['воскресенье','понедельник','вторник','среда','четверг','пятница','суббота'];
  const months = ['января','февраля','марта','апреля','мая','июня','июля','августа','сентября','октября','ноября','декабря'];
  const now = new Date();
  document.getElementById('dateLabel').textContent =
    `${days[now.getDay()]}, ${now.getDate()} ${months[now.getMonth()]}`;

  // ── RING ──
  function updateRing() {
    const circ = 2 * Math.PI * 80;
    const pct = Math.min(state.kcal / state.goal, 1);
    const offset = circ * (1 - pct);
    const ring = document.getElementById('ringProgress');
    ring.style.strokeDasharray = circ;
    ring.style.strokeDashoffset = offset;

    // dot position
    const angle = (pct * 360) - 90;
    const rad = (angle * Math.PI) / 180;
    const cx = 90 + 80 * Math.cos(rad);
    const cy = 90 + 80 * Math.sin(rad);
    const dot = document.getElementById('ringDot');
    dot.setAttribute('cx', cx);
    dot.setAttribute('cy', cy);

    document.getElementById('kcalBurned').textContent = state.kcal;
  }

  // ── WORKOUTS ──
  function openWorkoutModal() {
    selectedWorkout = null;
    document.querySelectorAll('.workout-opt').forEach(el => el.classList.remove('selected'));
    document.getElementById('workoutDuration').value = '';
    document.getElementById('workoutModal').classList.add('open');
  }

  function selectWorkout(el) {
    document.querySelectorAll('.workout-opt').forEach(e => e.classList.remove('selected'));
    el.classList.add('selected');
    selectedWorkout = { name: el.dataset.name, icon: el.dataset.icon, kcalPerMin: parseFloat(el.dataset.kcal) };
  }

  function addWorkout() {
    if (!selectedWorkout) { alert('Выберите тренировку!'); return; }
    const mins = parseInt(document.getElementById('workoutDuration').value);
    if (!mins || mins < 1) { alert('Введите длительность!'); return; }
    const kcal = Math.round(selectedWorkout.kcalPerMin * mins);
    state.workouts.push({ ...selectedWorkout, mins, kcal });
    state.kcal += kcal;
    state.points += Math.floor(kcal / 10);
    state.streak = Math.max(state.streak, 1);
    renderWorkouts();
    updateRing();
    updateHeader();
    closeModal('workoutModal');
  }

  function renderWorkouts() {
    const list = document.getElementById('workoutsList');
    const empty = document.getElementById('emptyWorkouts');
    document.getElementById('workoutCount').textContent = state.workouts.length;

    if (state.workouts.length === 0) {
      empty.style.display = 'block';
      list.querySelectorAll('.workout-item').forEach(e => e.remove());
      return;
    }
    empty.style.display = 'none';
    list.querySelectorAll('.workout-item').forEach(e => e.remove());

    state.workouts.forEach((w, i) => {
      const div = document.createElement('div');
      div.className = 'workout-item';
      div.innerHTML = `
        <div class="workout-icon">${w.icon}</div>
        <div class="workout-info">
          <div class="workout-name">${w.name}</div>
          <div class="workout-meta">${w.mins} мин</div>
        </div>
        <div>
          <div class="workout-kcal">${w.kcal}</div>
          <div class="workout-kcal-label">ккал</div>
        </div>
        <button class="btn-delete" onclick="deleteWorkout(${i})">✕</button>
      `;
      list.appendChild(div);
    });
  }

  function deleteWorkout(i) {
    state.kcal -= state.workouts[i].kcal;
    if (state.kcal < 0) state.kcal = 0;
    state.workouts.splice(i, 1);
    renderWorkouts();
    updateRing();
  }

  // ── WATER ──
  function openWaterModal() {
    document.getElementById('waterCustom').value = '';
    document.getElementById('waterModal').classList.add('open');
  }

  function addWater(amount) {
    state.water = Math.round((state.water + amount) * 10) / 10;
    document.getElementById('waterVal').textContent = state.water.toFixed(1);
    closeModal('waterModal');
  }

  function addWaterCustom() {
    const v = parseFloat(document.getElementById('waterCustom').value);
    if (!v || v <= 0) { alert('Введите объём!'); return; }
    addWater(v);
  }

  // ── STEPS ──
  function openStepsModal() {
    document.getElementById('stepsInput').value = state.steps || '';
    document.getElementById('stepsModal').classList.add('open');
  }

  function setSteps() {
    const v = parseInt(document.getElementById('stepsInput').value);
    if (isNaN(v) || v < 0) { alert('Введите число шагов!'); return; }
    state.steps = v;
    document.getElementById('stepsVal').textContent = v;
    // steps → kcal bonus (rough: 0.04 kcal/step)
    closeModal('stepsModal');
  }

  // ── HEADER ──
  function updateHeader() {
    document.getElementById('streakVal').textContent = state.streak;
    document.getElementById('pointsVal').textContent = state.points;
  }

  // ── MODAL UTILS ──
  function closeModal(id) {
    document.getElementById(id).classList.remove('open');
  }

  // close on overlay click
  document.querySelectorAll('.modal-overlay').forEach(overlay => {
    overlay.addEventListener('click', e => {
      if (e.target === overlay) overlay.classList.remove('open');
    });
  });

  // ── INIT ──
  updateRing();
</script>
</body>
</html>
